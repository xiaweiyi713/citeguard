name: Publish

on:
  push:
    tags:
      - "v*"
  # Allows re-running a publish after fixing configuration (for example a
  # missing PyPI trusted publisher) without deleting and re-pushing the tag.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache support models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: citeguard-support-models-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip "setuptools>=68" wheel build twine

      - name: Run unit tests
        run: python -m pip install -e . && python -m unittest discover -s tests

      - name: Install production model reviewers
        run: python -m pip install -e ".[models]"

      - name: Run automated release review
        run: >-
          python scripts/automated_release_review.py
          --output automated-release-review.json

      - name: Enforce software-release gate
        run: >-
          python scripts/release_package_gate.py
          --skip-install-smoke
          --require-build-tools
          --release-claim-mode software
          --automated-review-report automated-release-review.json

      - name: Preserve automated review evidence
        uses: actions/upload-artifact@v4
        with:
          name: automated-release-review
          path: automated-release-review.json

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Pick release notes file
        id: notes
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            echo "body_path=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release (with notes file)
        if: steps.notes.outputs.body_path != ''
        uses: softprops/action-gh-release@v2
        with:
          name: CiteGuard ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: dist/*

      - name: Create or update GitHub release (generated notes)
        if: steps.notes.outputs.body_path == ''
        uses: softprops/action-gh-release@v2
        with:
          name: CiteGuard ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
