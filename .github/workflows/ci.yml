name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run citation verification eval
        run: python scripts/eval_verification.py

      - name: Validate support eval dataset
        run: python scripts/eval_support.py --validate-only --label-sidecar data/eval/support_eval_label_sidecar.json --min-sidecar-coverage 1.0 --min-human-reviewed 0 --min-high-risk-reviewed 0 --min-high-risk-reviewed-by-language zh=0

      - name: Run deterministic support eval report quality gate
        run: python scripts/eval_support.py --report --split test --label-sidecar data/eval/support_eval_label_sidecar.json --min-sidecar-coverage 1.0 --min-human-reviewed 0 --min-high-risk-reviewed 0 --min-high-risk-reviewed-by-language zh=0 --quality-gate

      - name: Run deterministic support baseline comparison
        run: python scripts/compare_support_baselines.py --split test --min-high-risk-reviewed-by-language zh=0

      - name: Run package install smoke
        if: matrix.python-version == '3.10'
        run: python scripts/smoke_package.py --install-mode wheel

      - name: Run source distribution install smoke
        if: matrix.python-version == '3.10'
        run: python scripts/smoke_package.py --install-mode sdist

      - name: Run release package metadata gate
        if: matrix.python-version == '3.10'
        run: python -m pip install build twine && python scripts/release_package_gate.py --skip-install-smoke --require-build-tools --min-high-risk-reviewed-by-language zh=0

      - name: Run heuristic demo evaluation
        run: python scripts/evaluate.py --topic "citation hallucination in scientific writing" --support-mode heuristic

  mcp-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package with MCP extra
        run: python -m pip install --upgrade pip && python -m pip install -e ".[mcp]"

      - name: Run MCP extra wheel install smoke
        run: python scripts/release_package_gate.py --skip-install-smoke --include-mcp-extra-smoke --require-mcp-extra-smoke

      - name: Run MCP stdio release gate smoke
        run: python scripts/release_package_gate.py --skip-install-smoke --include-mcp-stdio-smoke --require-mcp-stdio-smoke

      - name: Run MCP stdio smoke
        run: python scripts/smoke_mcp.py --require-sdk
